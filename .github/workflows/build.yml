name: Build Nova Optimizer
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - name: Restore
      run: dotnet restore NovaOptimizer.csproj
    - name: Publish
      run: dotnet publish NovaOptimizer.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./output
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: NovaOptimizer-EXE
        path: ./output/NovaOptimizer.exe
